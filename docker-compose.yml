services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - miraki_db_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s


  redis:
    image: redis:7-alpine
    restart: unless-stopped

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10


  web:
    build: .
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_healthy


volumes:
  miraki_db_data: